<!DOCTYPE html>
<html>

<head>
    <style>
        * {
            margin: 0;
        }

        body {
            margin: 0;
            padding: 0;
            width:100%;
            height:100%;
        }

        .div-1 {
            position: relative;
            margin:auto;
            width: 50%;
            height: 100px;
            background-color: blue;
        }

        .div-2 {
            position: relative;
            left: 10px;
            top: 10px;
            width: 50px;
            height: 50px;
            background-color: green;
        }
    </style>
</head>

<body>
    <div class="div-1">
        <div class="div-2"></div>
    </div>
</body>

</html>
